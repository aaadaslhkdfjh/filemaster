<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>登录 - 文件处理大师</title>
<link rel="stylesheet" href="style.css"/><link rel="icon" href="favicon.ico"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo"><img src="favicon.ico" class="logo-icon-img" alt="logo"/><span>文件处理大师</span></a>
    <ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="features.html">功能</a></li><li><a href="activity.html">🎁 内测活动</a></li><li><a href="faq.html">帮助</a></li></ul>
    <div class="nav-actions"><a href="login.html" class="btn-primary">登录</a><a href="register.html" class="btn-ghost">注册</a></div>
  </div>
</nav>

<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div class="form-card">
    <h2>欢迎回来</h2>
    <p>登录后即可使用全部功能，数据与软件同步</p>

    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="email" placeholder="请输入注册邮箱"/>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码"/>
    </div>
    <div id="loginError" class="form-error"></div>
    <button class="form-submit" onclick="doLogin()">登 录</button>

    <div class="form-footer">
      还没有账号？<a href="register.html">立即注册</a>
      &nbsp;·&nbsp;
      <a href="forgot.html">忘记密码</a>
    </div>
  </div>
</div>

<script>
const API = 'https://api.qhz47.cn';

async function doLogin(){
  var email = document.getElementById('email').value.trim();
  var pwd   = document.getElementById('password').value;
  var err   = document.getElementById('loginError');
  err.style.display='none';

  if(!email||!pwd){err.textContent='请填写邮箱和密码';err.style.display='block';return;}

  try{
    var r = await fetch(API+'/api/auth/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone:email,password:pwd,device_id:'web'})
    });
    var d = await r.json();
    if(d.code===200){
      localStorage.setItem('token',d.data.token);
      localStorage.setItem('nickname',d.data.nickname||email);
      localStorage.setItem('email',d.data.phone);
      window.location.href='index.html';
    }else{
      err.textContent=d.msg||'登录失败';err.style.display='block';
    }
  }catch(e){err.textContent='网络连接失败';err.style.display='block';}
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
