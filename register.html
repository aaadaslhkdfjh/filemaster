<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>注册 - 文件处理大师</title>
<link rel="stylesheet" href="style.css"/><link rel="icon" href="favicon.ico"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo"><img src="favicon.ico" class="logo-icon-img" alt="logo"/><span>文件处理大师</span></a>
    <ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="activity.html">🎁 内测活动</a></li><li><a href="faq.html">帮助</a></li></ul>
    <div class="nav-actions"><a href="login.html" class="btn-ghost">登录</a><a href="register.html" class="btn-primary">注册</a></div>
  </div>
</nav>

<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div class="form-card" style="max-width:520px">
    <h2>创建账号</h2>
    <p>🎁 内测期间注册即送 <strong style="color:#4F6EF7">1个月会员</strong>，注册后联系QQ群领取</p>

    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="email" placeholder="请输入邮箱"/>
    </div>
    <div class="form-group">
      <label>验证码</label>
      <div class="form-row">
        <input type="text" id="code" placeholder="6位验证码" maxlength="6"/>
        <button class="btn-outline" id="sendBtn" onclick="sendCode()">获取验证码</button>
      </div>
    </div>
    <div class="form-group">
      <label>密码 <span style="color:#9CA3AF;font-size:12px">（8-20位，含大小写字母、数字、特殊符号）</span></label>
      <input type="password" id="password" placeholder="设置密码"/>
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="password2" placeholder="再次输入密码"/>
    </div>
    <div id="regError" class="form-error"></div>
    <div id="regSuccess" class="form-success"></div>
    <button class="form-submit" onclick="doRegister()">注 册</button>

    <div class="form-footer">已有账号？<a href="login.html">立即登录</a></div>
  </div>
</div>

<script>
const API = 'https://api.qhz47.cn';
var countdown = 0;

async function sendCode(){
  var email = document.getElementById('email').value.trim();
  var err = document.getElementById('regError');
  err.style.display='none';
  if(!email||!email.includes('@')){err.textContent='请输入正确的邮箱';err.style.display='block';return;}
  if(countdown>0)return;

  try{
    var r = await fetch(API+'/api/sms/send',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,purpose:'register'})
    });
    var d = await r.json();
    if(d.code===200){
      startCountdown();
    }else{
      err.textContent=d.msg||'发送失败';err.style.display='block';
    }
  }catch(e){err.textContent='网络连接失败';err.style.display='block';}
}

function startCountdown(){
  countdown=60;
  var btn=document.getElementById('sendBtn');
  var t=setInterval(function(){
    countdown--;
    btn.textContent=countdown+'秒后重发';
    if(countdown<=0){clearInterval(t);btn.textContent='获取验证码';}
  },1000);
}

async function doRegister(){
  var email=document.getElementById('email').value.trim();
  var code=document.getElementById('code').value.trim();
  var pwd=document.getElementById('password').value;
  var pwd2=document.getElementById('password2').value;
  var err=document.getElementById('regError');
  var suc=document.getElementById('regSuccess');
  err.style.display='none';suc.style.display='none';

  if(!email||!code||!pwd){err.textContent='请填写所有字段';err.style.display='block';return;}
  if(pwd!==pwd2){err.textContent='两次密码不一致';err.style.display='block';return;}

  try{
    var r=await fetch(API+'/api/auth/register',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,sms_code:code,password:pwd})
    });
    var d=await r.json();
    if(d.code===200){
      suc.textContent='注册成功！请加入QQ群 1084088937 领取1个月会员奖励 🎉';
      suc.style.display='block';
      setTimeout(function(){window.location.href='login.html';},3000);
    }else{
      err.textContent=d.msg||'注册失败';err.style.display='block';
    }
  }catch(e){err.textContent='网络连接失败';err.style.display='block';}
}
</script>
</body>
</html>
